version: '3.8'

# 环境变量：APP_ENV=dev|test|prod（默认 dev）
x-env: &env
  APP_ENV: ${APP_ENV:-dev}

services:
  # ===== 后端 =====
  backend:
    build: ./backend
    ports:
      - "10011:10011"
    environment:
      - <<: *env
      # 生产环境通过 .env.prod 配置 DATABASE_URL，无需在此硬编码
    volumes:
      - ./backend/logs:/app/logs
    restart: unless-stopped
    networks:
      - guigraph-net
    # 开发环境用 SQLite 不需要额外容器；生产环境取消下面注释
    # depends_on:
    #   - oracle

  # ===== 前端 =====
  frontend:
    image: node:20-alpine
    working_dir: /app/frontend
    ports:
      - "10010:10010"
    volumes:
      - ./frontend:/app/frontend
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 10010"
    depends_on:
      - backend
    networks:
      - guigraph-net

  # ===== Oracle 数据库（生产环境启用） =====
  # oracle:
  #   image: gvenzl/oracle-free:23-slim
  #   ports:
  #     - "1521:1521"
  #   environment:
  #     ORACLE_PASSWORD: guigraph_password
  #     ORACLE_DATABASE: guigraph
  #   volumes:
  #     - oradata:/opt/oracle/oradata
  #   networks:
  #     - guigraph-net

  # ===== MinIO 文件存储 =====
  minio:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    command: server /data --console-address :9001
    volumes:
      - miniodata:/data
    networks:
      - guigraph-net

volumes:
  oradata:
  miniodata:

networks:
  guigraph-net:
    driver: bridge
